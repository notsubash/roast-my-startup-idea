name: Eval Audit

on:
  workflow_dispatch:
  schedule:
    # Monthly: 1st of each month at 08:00 UTC
    - cron: "0 8 1 * *"

jobs:
  deepseek-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dry-run token estimate
        run: python -m evals.run_audit --dry-run --no-reuse-last-local --baseline-only

      - name: Run DeepSeek grader on committed baselines
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "Skipping DeepSeek grader: DEEPSEEK_API_KEY is not configured."
            exit 0
          fi
          python -m evals.run_audit --no-reuse-last-local --baseline-only

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-audit-report
          path: evals/results/audits/
          if-no-files-found: ignore
