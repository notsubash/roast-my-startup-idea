name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.15.19

      - name: Ruff lint
        run: ruff check src tests evals

      - name: Ruff format
        run: ruff format --check src tests evals

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify version
        run: python -c "import sys; sys.path.insert(0, 'src'); from version import get_version; v = get_version(); assert v, v; print(v)"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile check
        run: python -m compileall -q src
